name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'data_raw/**'
      - 'preprocessing/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_NathanAlvinoFam.py --input data_raw/credit_risk_dataset.csv --output preprocessing/credit_risk_clean.csv

      - name: Commit and Push Clean Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated data preprocessing via GitHub Actions" || echo "No changes to commit"
          git pull --rebase origin main
          git push
          